about:
  title:
    en: HOW IT WORKS
    zh: 运作方式
    ja: 仕組み
  overview:
    en: Security Daily Digest is a fully automated cybersecurity news briefing. Every day, the system collects articles from security researchers, vendor blogs, threat intelligence feeds, and Hacker News — then scores and filters them through a multi-stage AI pipeline.
    zh: 安全日知录是一份全自动的网络安全日报。系统每天从安全研究者、厂商博客、威胁情报源和 Hacker News 采集文章，经过多阶段 AI 流水线评分筛选。
    ja: セキュリティ日知録は完全自動化されたサイバーセキュリティニュースブリーフィングです。セキュリティ研究者、ベンダーブログ、脅威インテリジェンスフィード、Hacker Newsから毎日記事を収集し、多段階AIパイプラインで評価・フィルタリングします。
  policyAudience:
    en: 'Target audience: security engineers, SOC analysts, and DevSecOps practitioners.'
    zh: 目标读者：安全工程师、SOC 分析师和 DevSecOps 从业者。
    ja: 対象読者：セキュリティエンジニア、SOCアナリスト、およびDevSecOps実践者。
  disclaimer:
    en: Headlines and analysis paragraphs are generated by AI and may contain inaccuracies. All original reporting belongs to their respective sources.
    zh: 标题和分析段落由 AI 生成，可能存在不准确之处。所有原始报道版权归各自来源所有。
    ja: 見出しと分析パラグラフはAIにより生成されており、不正確な場合があります。すべてのオリジナル記事は各ソースに帰属します。
schedule:
  cron: 0 7 * * *
