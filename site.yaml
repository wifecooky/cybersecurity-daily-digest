    en: Cybersecurity news, daily.
    zh: 每天五分钟，跟上网络安全动态
    ja: サイバーセキュリティの最新動向を毎日
  description:
    en: Daily curated cybersecurity news. Covering vulnerabilities, threat intelligence, security research, and incident response.
    zh: 网络安全日报 — 每天精选安全动态，覆盖漏洞、威胁情报、安全研究和事件响应。
    ja: サイバーセキュリティの厳選日刊ダイジェスト。脆弱性、脅威インテリジェンス、セキュリティ研究、インシデント対応を毎日配信。
  keywords:
    en: cybersecurity news, security, vulnerabilities, CVE, threat intelligence, daily digest
    zh: 网络安全新闻, 安全, 漏洞, CVE, 威胁情报, 每日简报
    ja: サイバーセキュリティニュース, セキュリティ, 脆弱性, CVE, 脅威インテリジェンス, デイリーダイジェスト
